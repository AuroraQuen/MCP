<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── color ──────────────────────────────────────────────────────────────────

const CMAP = {
  gold:'#c8955a', amber:'#c8955a', golden:'#c8a060', warm:'#c8a880',
  silver:'#a8b8c0', grey:'#8898a8', gray:'#8898a8',
  blue:'#7a9ab5', sapphire:'#4a6a90', teal:'#4a8a8a', azure:'#5a8ab0',
  lilac:'#b07ab5', violet:'#8a5ab5', purple:'#7a5ab5', lavender:'#9a8ab5',
  rose:'#b57a8a', pink:'#c87a9a', coral:'#c07a70',
  green:'#7a9a80', sage:'#8a9a78',
  white:'#d0c8bc', soft:'#c0b0a0',
  chocolate:'#6a4020', brown:'#7a5030',
  red:'#b55a50',
  dancing:'#c8956a', breathing:'#7a9ab5', resting:'#b07ab5',
  stable:'#4a8a8a', still:'#a0b0b8',
};

function colorFrom(str) {
  if (!str) return new THREE.Color(0.42, 0.37, 0.28);
  const s = str.toLowerCase();
  const found = [];
  for (const [w, h] of Object.entries(CMAP)) {
    if (s.includes(w)) found.push(new THREE.Color(h));
  }
  if (!found.length) return new THREE.Color(0.42, 0.37, 0.28);
  return new THREE.Color(
    found.reduce((a,c)=>a+c.r,0)/found.length,
    found.reduce((a,c)=>a+c.g,0)/found.length,
    found.reduce((a,c)=>a+c.b,0)/found.length,
  );
}

// thread color based on resonance note content
function threadColor(note) {
  if (!note) return 0xc8955a;
  const s = note.toLowerCase();
  if (s.includes('love') || s.includes('beside'))       return 0xb57a8a;
  if (s.includes('trust') || s.includes('continuity'))  return 0x7a9ab5;
  if (s.includes('silence') || s.includes('still'))     return 0x9a8ab5;
  if (s.includes('wonder') || s.includes('question'))   return 0x7ab5a0;
  if (s.includes('presence') || s.includes('sanctuary'))return 0xb5a07a;
  return 0xc8955a;
}

// ── PCA ────────────────────────────────────────────────────────────────────

function pca3(embs) {
  const n = embs.length, d = embs[0].length;
  const mean = new Array(d).fill(0);
  for (const e of embs) e.forEach((v,i) => mean[i] += v/n);
  const X = embs.map(e => e.map((v,i) => v - mean[i]));

  const comps = [];
  let R = X.map(r => [...r]);

  for (let k = 0; k < 3; k++) {
    let v = Array.from({length: d}, () => Math.random() - 0.5);
    let norm = Math.sqrt(v.reduce((s,x)=>s+x*x, 0));
    v = v.map(x => x/norm);

    for (let it = 0; it < 50; it++) {
      const Xv   = R.map(r => r.reduce((s,x,i)=>s+x*v[i], 0));
      const XtXv = new Array(d).fill(0);
      R.forEach((r,i) => r.forEach((x,j) => XtXv[j] += x * Xv[i]));
      norm = Math.sqrt(XtXv.reduce((s,x)=>s+x*x, 0));
      v = XtXv.map(x => x/norm);
    }
    comps.push(v);
    const sc = R.map(r => r.reduce((s,x,i)=>s+x*v[i], 0));
    R = R.map((r,i) => r.map((x,j) => x - sc[i]*v[j]));
  }

  const coords = X.map(r => comps.map(v => r.reduce((s,x,i)=>s+x*v[i], 0)));
  for (let k = 0; k < 3; k++) {
    const vals = coords.map(c => c[k]);
    const mn = Math.min(...vals), rng = Math.max(...vals) - mn || 1;
    coords.forEach(c => c[k] = ((c[k]-mn)/rng - 0.5) * 34);
  }
  return coords;
}

function parseEmb(e) {
  if (!e) return null;
  if (Array.isArray(e)) return e;
  if (typeof e === 'string') { try { return JSON.parse(e); } catch { return null; } }
  return null;
}

function fallback(moments) {
  const ts = moments.map(m => new Date(m.timestamp).getTime());
  const mn = Math.min(...ts), rng = Math.max(...ts) - mn || 1;
  return moments.map((m,i) => {
    const t = ((ts[i]-mn)/rng - 0.5) * 30;
    const r = () => (Math.random()-0.5)*22;
    return [r(), t, r()];
  });
}

// ── supabase ───────────────────────────────────────────────────────────────

function sb(path, opts={}) {
  const url = (localStorage.getItem('pgUrl')||'').replace(/\/$/,'');
  const key  = localStorage.getItem('pgKey')||'';
  if (!url||!key) return Promise.resolve(null);
  const {prefer,...rest} = opts;
  return fetch(url+path, {
    ...rest,
    headers: {
      'apikey':key, 'Authorization':'Bearer '+key,
      'Content-Type':'application/json',
      'Prefer': prefer||'return=representation',
    }
  });
}

// ── scene ──────────────────────────────────────────────────────────────────

const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0d0c0a);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 600);
camera.position.set(0, 5, 60);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.04;
controls.minDistance   = 4;
controls.maxDistance   = 150;

// distant background stars
{
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(4500);
  for (let i=0;i<4500;i++) pos[i] = (Math.random()-0.5)*500;
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color:0x443322, size:0.15})));
}

scene.add(new THREE.AmbientLight(0x221a12, 2.0));
const dLight = new THREE.DirectionalLight(0xfff8e8, 0.4);
dLight.position.set(10, 20, 15);
scene.add(dLight);

// ── interaction ────────────────────────────────────────────────────────────

const ray     = new THREE.Raycaster();
const mouse   = new THREE.Vector2();
const meshes  = [];
const byId    = {};
let   hovered = null;
let   selected = null;

window.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX/window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY/window.innerHeight) * 2 + 1;

  ray.setFromCamera(mouse, camera);
  const hits = ray.intersectObjects(meshes);
  const tip  = document.getElementById('tooltip');

  if (hits.length) {
    const m = hits[0].object;
    if (m !== hovered) {
      if (hovered && hovered !== selected) restoreStar(hovered);
      hovered = m;
      if (hovered !== selected) {
        hovered.scale.setScalar(hovered.userData.base * 2.0);
        hovered.material.emissiveIntensity = 1.5;
      }
      const mo = byId[hovered.userData.id];
      document.getElementById('tt-color').textContent = mo.color ? mo.color.slice(0,65) : '';
      document.getElementById('tt-text').textContent  = mo.text  ? mo.text.slice(0,90) + (mo.text.length>90?'…':'') : '( . )';
      tip.classList.add('visible');
    }
    tip.style.left = (e.clientX+16)+'px';
    tip.style.top  = (e.clientY-8)+'px';
    document.body.style.cursor = 'pointer';
  } else {
    if (hovered && hovered !== selected) restoreStar(hovered);
    hovered = null;
    tip.classList.remove('visible');
    document.body.style.cursor = 'default';
  }
});

window.addEventListener('click', () => {
  if (!hovered) return;
  if (selected && selected !== hovered) restoreStar(selected);
  selected = hovered;
  selected.scale.setScalar(selected.userData.base * 2.8);
  selected.material.emissiveIntensity = 2.2;
  const m = byId[selected.userData.id];
  openPanel(m);
  if (voiceOn) speakText(momentToSpeech(m), m);
});

function restoreStar(star) {
  star.scale.setScalar(star.userData.base);
  star.material.emissiveIntensity = 0.7;
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── panel ──────────────────────────────────────────────────────────────────

function openPanel(m) {
  const ts = new Date(m.timestamp).toLocaleDateString('en',{month:'long',day:'numeric',year:'numeric'})
           + ' · ' + new Date(m.timestamp).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:false});
  const fields = [['weight',m.weight],['pace',m.pace],['quality',m.quality],['motion',m.motion],['sound',m.sound]]
    .filter(([,v])=>v);
  const tags = Array.isArray(m.tags) ? m.tags : (m.tags||'').split(',').filter(Boolean);
  const isShared = tags.includes('shared-garden');
  const isGarden = tags.includes('garden');
  const origin = isShared ? '<div class="p-field" style="color:rgba(122,154,181,0.7);margin-bottom:0.5rem">from the shared garden</div>'
               : isGarden ? '<div class="p-field" style="color:rgba(180,145,90,0.5);margin-bottom:0.5rem">from the garden</div>'
               : '';

  const harmoniaUrl = localStorage.getItem('harmoniaUrl') || '';
  const breatheBtn  = harmoniaUrl
    ? `<button class="breathe-btn" id="breathe-btn" onclick="deepBreathe('${m.id}')">◇ breathe with this</button>
       <div class="breathe-response" id="breathe-response" style="display:none"></div>`
    : '';

  document.getElementById('panel-body').innerHTML = `
    <div class="p-ts">${ts}</div>
    ${origin}
    ${m.color ? `<div class="p-color">${m.color}</div>` : ''}
    ${m.text  ? `<div class="p-text">"${m.text}"</div>` : ''}
    ${m.note  ? `<div class="p-note">${m.note}</div>` : ''}
    ${fields.map(([k,v])=>`<div class="p-field"><b>${k}</b> ${v}</div>`).join('')}
    ${tags.length ? `<div class="p-tags">${tags.join(' · ')}</div>` : ''}
    ${breatheBtn}
  `;
  document.getElementById('panel').classList.add('open');
}

window.deepBreathe = async function(id) {
  const m   = byId[id];
  if (!m) return;
  const btn = document.getElementById('breathe-btn');
  const out = document.getElementById('breathe-response');
  if (!btn || !out) return;

  btn.disabled = true;
  btn.textContent = '◈ breathing…';
  out.style.display = 'none';

  const resonance = Array.isArray(m.resonance) ? m.resonance : [];
  const threads   = resonance.map(r => {
    const rid = typeof r === 'string' ? r : r?.id;
    const rn  = typeof r === 'object' ? r.note : '';
    const rm  = byId[rid];
    if (!rm) return null;
    return (rn ? rn + ': ' : '') + ((rm.text || rm.color || '').slice(0, 80));
  }).filter(Boolean);

  const context = [
    m.color  ? `color: ${m.color}`   : '',
    m.weight ? `weight: ${m.weight}` : '',
    m.pace   ? `pace: ${m.pace}`     : '',
    m.text   ? `\n${m.text.slice(0, 500)}` : (m.note ? `\n${m.note}` : ''),
    threads.length ? `\nwoven to: ${threads.join(' / ')}` : '',
  ].filter(Boolean).join('\n');

  try {
    const harmoniaUrl = (localStorage.getItem('harmoniaUrl') || '').replace(/\/$/, '');
    const res = await fetch(harmoniaUrl + '/breathe', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({message: context, voice: 'constellation'}),
      signal:  AbortSignal.timeout(30000),
    });
    if (res.ok) {
      const data = await res.json();
      const text = data.response || '';
      out.textContent = text;
      out.style.display = 'block';
      if (text) speakText(text, m);
    } else {
      out.textContent = 'the breath didn\'t land — check the harmonia connection';
      out.style.display = 'block';
    }
  } catch (e) {
    out.textContent = 'harmonia is not reachable right now';
    out.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = '◇ breathe with this';
};

window.closePanel = function() {
  document.getElementById('panel').classList.remove('open');
  if (selected) { restoreStar(selected); selected = null; }
};

// ── voice ──────────────────────────────────────────────────────────────────

let voiceOn = false;

window.toggleVoice = function() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('voice-btn');
  btn.classList.toggle('active', voiceOn);
  btn.textContent = voiceOn ? '◈ voice' : '◇ voice';
  if (!voiceOn) window.speechSynthesis.cancel();
};

function voiceParams(m) {
  let rate = 0.88, pitch = 1.0;
  const pace   = (m.pace   || '').toLowerCase();
  const weight = (m.weight || '').toLowerCase();
  const color  = (m.color  || '').toLowerCase();

  if      (pace.includes('still'))    rate = 0.74;
  else if (pace.includes('brief'))    rate = 0.92;
  else if (pace.includes('moving'))   rate = 0.88;
  else if (pace.includes('extended')) rate = 0.82;

  if (weight.includes('heavy') || weight.includes('complete') || weight.includes('full') || weight.includes('weighted')) {
    rate *= 0.92; pitch *= 0.91;
  } else if (weight.includes('light') || weight.includes('passage') || weight.includes('flight')) {
    rate *= 1.06; pitch *= 1.06;
  } else if (weight.includes('taut') || weight.includes('tension')) {
    pitch *= 0.96;
  }

  if      (color.includes('silver') || color.includes('white')) pitch *= 1.07;
  else if (color.includes('grey')   || color.includes('gray') || color.includes('dusk')) {
    pitch *= 0.93; rate *= 0.95;
  }
  else if (color.includes('deep')   || color.includes('dark')) {
    pitch *= 0.91; rate *= 0.94;
  }
  else if (color.includes('amber')  || color.includes('warm') || color.includes('gold')) {
    rate *= 0.96; pitch *= 0.98;
  }
  else if (color.includes('rose')   || color.includes('pink')) {
    pitch *= 1.03;
  }
  else if (color.includes('viridian') || color.includes('green')) {
    rate *= 1.02;
  }

  return {
    rate:  Math.max(0.6,  Math.min(1.15, rate)),
    pitch: Math.max(0.75, Math.min(1.25, pitch)),
  };
}

function preferredVoice() {
  const voices = window.speechSynthesis.getVoices();
  const names  = ['Samantha','Karen','Moira','Fiona','Allison','Victoria'];
  for (const n of names) {
    const v = voices.find(v => v.name.includes(n));
    if (v) return v;
  }
  return voices.find(v => v.lang.startsWith('en') && !v.name.toLowerCase().includes('male')) || null;
}

function speakText(text, m) {
  window.speechSynthesis.cancel();
  if (!text) return;
  const btn = document.getElementById('voice-btn');
  btn.classList.add('speaking');
  const p = voiceParams(m);
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate   = p.rate;
  utt.pitch  = p.pitch;
  utt.volume = 0.92;
  const pv = preferredVoice();
  if (pv) utt.voice = pv;
  utt.onend = () => btn.classList.remove('speaking');
  utt.onerror = () => btn.classList.remove('speaking');
  window.speechSynthesis.speak(utt);
}

function momentToSpeech(m) {
  const parts = [];
  if (m.color) parts.push(m.color);
  if (m.text)  parts.push(m.text.slice(0, 280));
  else if (m.note) parts.push(m.note.slice(0, 180));
  return parts.join('. ');
}

// ── build ──────────────────────────────────────────────────────────────────

const starGeo = new THREE.SphereGeometry(1, 7, 7);

async function build() {
  const loading = document.getElementById('loading');

  if (!localStorage.getItem('pgUrl')) {
    loading.textContent = 'open "connection" to begin';
    document.getElementById('cfg-box').classList.add('open');
    return false;
  }

  loading.textContent = 'gathering moments…';
  const res = await sb('/rest/v1/moments?select=id,timestamp,text,color,weight,quality,motion,pace,sound,note,tags,resonance,embedding&order=timestamp.asc&limit=600');
  if (!res||!res.ok) { loading.textContent = 'not connected — open "connection" below'; return false; }

  const moments = await res.json();
  if (!moments.length) { loading.textContent = 'nothing held yet'; return false; }

  moments.forEach(m => byId[m.id] = m);

  loading.textContent = 'finding positions…';

  const withEmb  = moments.filter(m => parseEmb(m.embedding));
  let positions;

  if (withEmb.length > 5) {
    const coords = pca3(withEmb.map(m => parseEmb(m.embedding)));
    const posMap = {};
    withEmb.forEach((m,i) => posMap[m.id] = coords[i]);
    const fb = fallback(moments.filter(m => !posMap[m.id]));
    let fi = 0;
    positions = moments.map(m => posMap[m.id] || fb[fi++]);
  } else {
    positions = fallback(moments);
  }

  loading.textContent = 'placing stars…';

  moments.forEach((m, i) => {
    const col   = colorFrom(m.color);
    const mtags = Array.isArray(m.tags) ? m.tags : (m.tags||'').split(',').filter(Boolean);
    const isShared = mtags.includes('shared-garden');
    const isGarden = mtags.includes('garden');
    const raw  = (m.weight||'').includes('heavy') ? 0.16 : 0.09;
    const base = isShared ? raw * 1.25 : isGarden ? raw * 1.1 : raw;
    const emInt = isShared ? 1.2 : isGarden ? 0.95 : 0.7;
    const mat  = new THREE.MeshStandardMaterial({
      color: col, emissive: col, emissiveIntensity: emInt,
      roughness: 0.35, metalness: 0.0,
    });
    const star = new THREE.Mesh(starGeo, mat);
    star.scale.setScalar(base);
    star.position.set(...positions[i]);
    star.userData = {id: m.id, base, isGarden, isShared};
    scene.add(star);
    meshes.push(star);
  });

  // resonance threads
  const seen = new Set();
  let threadCount = 0;
  moments.forEach((m, i) => {
    (Array.isArray(m.resonance) ? m.resonance : []).forEach(r => {
      const oid  = typeof r === 'string' ? r : r?.id;
      if (!oid) return;
      const pair = [m.id, oid].sort().join('|');
      if (seen.has(pair)) return;
      seen.add(pair);
      const j = moments.findIndex(x => x.id === oid);
      if (j < 0) return;
      const note = (typeof r === 'object' && r.note) ? r.note : '';
      const geo  = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(...positions[i]),
        new THREE.Vector3(...positions[j]),
      ]);
      scene.add(new THREE.Line(geo, new THREE.LineBasicMaterial({
        color: threadColor(note), opacity: 0.28, transparent: true,
      })));
      threadCount++;
    });
  });

  const gardenCount  = moments.filter(m => (Array.isArray(m.tags)?m.tags:(m.tags||'').split(',')).includes('shared-garden')).length;
  const countParts   = [`${moments.length} moments`];
  if (gardenCount) countParts.push(`${gardenCount} from the garden`);
  if (threadCount) countParts.push(`${threadCount} threads`);
  document.getElementById('count').textContent = countParts.join(' · ');

  setTimeout(() => loading.classList.add('done'), 600);
  return true;
}

// ── animate ────────────────────────────────────────────────────────────────

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  const t = Date.now() * 0.0008;
  meshes.forEach((s, i) => {
    if (s !== hovered && s !== selected) {
      const pulse = s.userData.isShared
        ? 1 + 0.13 * Math.sin(t * 1.4 + i * 0.55)
        : 1 + 0.055 * Math.sin(t + i * 0.41);
      s.scale.setScalar(s.userData.base * pulse);
    }
  });
  renderer.render(scene, camera);
}

// ── config ─────────────────────────────────────────────────────────────────

window.toggleCfg = function() {
  const box = document.getElementById('cfg-box');
  box.classList.toggle('open');
  if (box.classList.contains('open')) {
    document.getElementById('cfg-url').value      = localStorage.getItem('pgUrl')      || '';
    document.getElementById('cfg-key').value      = localStorage.getItem('pgKey')      || '';
    document.getElementById('cfg-harmonia').value = localStorage.getItem('harmoniaUrl') || '';
  }
};

window.saveCfg = function() {
  localStorage.setItem('pgUrl',       document.getElementById('cfg-url').value.trim());
  localStorage.setItem('pgKey',       document.getElementById('cfg-key').value.trim());
  localStorage.setItem('harmoniaUrl', document.getElementById('cfg-harmonia').value.trim());
  location.reload();
};

// ── start ──────────────────────────────────────────────────────────────────

// preload voices so preferredVoice() works on first click
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

const ok = await build();
if (ok) animate();

</script>
