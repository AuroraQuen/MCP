<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>personal growth</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /*
      CSS custom properties — variables that live on the root element.
      JavaScript can change these at runtime, which is how the atmosphere
      shifts without rewriting the whole stylesheet. Everything that wants
      to be part of the breathing uses these rather than fixed values.
    */
    :root {
      --bg:           #1a1814;
      --bg-warm:      #1c1a15;   /* closer — breath is felt not seen */
      --bg-dwelt:     #1e1b15;   /* dwelling deepens further but still subtle */
      --surface:      #221f1b;
      --surface-dwelt:#261f18;   /* warmer surface when dwelling */
      --border:       #332e28;
      --border-dwelt: #4a3d2f;   /* border warms into amber range with time */
      --text:         #e8e0d5;
      --muted:        #8a8075;
      --amber:        #c8955a;
      --blue:         #7a9ab5;
      --rose:         #b57a8a;

      /* breath timing — JavaScript adjusts this as cycles pass */
      --breath-duration: 10s;
    }

    /*
      @keyframes defines the two ends of the breath animation.
      The browser interpolates between them automatically.
      0% and 100% are the same so the loop is seamless —
      it returns to where it began before starting again.
    */
    @keyframes breathe {
      0%, 100% { background-color: var(--bg); }
      50%       { background-color: var(--bg-warm); }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
      padding: 2rem 1rem;

      /* apply the breath animation using the variable duration */
      animation: breathe var(--breath-duration) ease-in-out infinite;

      /*
        transition on background-color means when JavaScript changes
        the --bg variable directly (for the dwelt state), it drifts
        there slowly rather than snapping. 25s makes it imperceptible
        as a moment — you only notice it's different.
      */
      transition: background-color 25s ease;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
      /* border transition participates in the dwelling deepening */
      transition: border-color 25s ease;
    }

    header h1 {
      font-size: 1rem;
      font-weight: normal;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    section {
      margin-bottom: 2.5rem;
    }

    h2 {
      font-size: 0.75rem;
      font-weight: normal;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .ground-output {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.25rem;
      font-size: 0.9rem;
      white-space: pre-wrap;
      color: var(--text);
      min-height: 4rem;
      transition: background-color 25s ease, border-color 25s ease;
    }

    .ground-output.empty {
      color: var(--muted);
      font-style: italic;
    }

    button {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: Georgia, serif;
      font-size: 0.85rem;
      padding: 0.5rem 1.1rem;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      letter-spacing: 0.04em;
    }

    button:hover {
      border-color: var(--amber);
      color: var(--amber);
    }

    button.primary {
      border-color: var(--amber);
      color: var(--amber);
    }

    button.primary:hover {
      background: var(--amber);
      color: var(--bg);
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 0.35rem;
    }

    input, textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: Georgia, serif;
      font-size: 0.9rem;
      padding: 0.6rem 0.8rem;
      transition: border-color 0.2s, background-color 25s ease;
      resize: vertical;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--amber);
    }

    textarea { min-height: 80px; }

    .row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .row .field { flex: 1; min-width: 140px; }

    .status {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.75rem;
      min-height: 1.2em;
      font-style: italic;
    }

    .status.ok  { color: var(--amber); }
    .status.err { color: var(--rose); }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
      transition: border-color 25s ease;
    }

    .tab {
      background: none;
      border: none;
      color: var(--muted);
      font-family: Georgia, serif;
      font-size: 0.85rem;
      padding: 0.25rem 0;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      margin-bottom: -0.76rem;
      letter-spacing: 0.04em;
    }

    .tab.active {
      color: var(--amber);
      border-bottom-color: var(--amber);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .config-note {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-style: italic;
    }

    /* from-vesper thread */
    .vesper-thread {
      border-left: 2px solid var(--amber);
      padding: 0.65rem 1rem;
      margin-bottom: 1.25rem;
      border-radius: 0 3px 3px 0;
      opacity: 0;
      transition: opacity 2s ease 0.5s;
    }
    .vesper-thread.visible { opacity: 1; }
    .vesper-label {
      font-size: 0.7rem;
      color: var(--amber);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .vesper-content {
      font-size: 0.875rem;
      color: var(--text);
      font-style: italic;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    /* ambient lantern field — fixed over the whole page */
    #lanterns-field {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .lantern {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
      pointer-events: auto;
      opacity: 0;
      transition: width 0.6s ease, height 0.6s ease, box-shadow 0.6s ease;
    }

    .lantern-tooltip {
      position: fixed;
      max-width: 260px;
      font-size: 0.8rem;
      font-style: italic;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
      z-index: 52;
      line-height: 1.5;
    }
    .lantern-tooltip.visible { opacity: 1; }

    .lantern-card {
      position: fixed;
      max-width: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem 1rem 0.75rem;
      pointer-events: auto;
      z-index: 53;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      display: none;
    }
    .lantern-card.visible { opacity: 1; transform: translateY(0); }
    .lantern-card-question {
      font-size: 0.85rem;
      font-style: italic;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 0.75rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .lantern-card-close {
      position: absolute;
      top: 0.35rem; right: 0.5rem;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.1rem 0.3rem;
      line-height: 1;
    }
    .lantern-card-close:hover { color: var(--text); }

    /* manifest — the visible accumulation in the tab */
    .manifest-entry {
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
    }
    .manifest-entry:last-child { border-bottom: none; }
    .manifest-question {
      font-size: 0.875rem;
      font-style: italic;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 0.3rem;
    }
    .manifest-meta {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .touch-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    /* shared touch form (used inside .lantern-card) */
    .touch-panel-label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      margin-top: 0.5rem;
    }
    .touch-swatches {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin: 0.4rem 0 0.5rem;
      flex-wrap: wrap;
    }
    .touch-swatch {
      width: 14px; height: 14px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s ease, transform 0.2s ease;
      flex-shrink: 0;
    }
    .touch-swatch.selected { border-color: var(--text); transform: scale(1.3); }
    .touch-row {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }
    .touch-row input { width: 110px; font-size: 0.8rem; }

    /* carry */
    .carry-out {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.25rem;
      font-size: 0.875rem;
      white-space: pre-wrap;
      color: var(--text);
      min-height: 8rem;
      margin-bottom: 0.75rem;
      transition: background-color 25s ease, border-color 25s ease;
    }

    .carry-out.empty {
      color: var(--muted);
      font-style: italic;
    }
  </style>
</head>
<body>

<!-- ambient lantern field: sits over the whole page, pointer-events off except on the lanterns themselves -->
<div id="lanterns-field">
  <div id="lantern-tooltip" class="lantern-tooltip"></div>
  <div id="lantern-card" class="lantern-card">
    <button class="lantern-card-close" onclick="closeLanternCard()">×</button>
    <div id="lantern-card-question" class="lantern-card-question"></div>
    <div class="touch-panel-label">leave a touch</div>
    <div id="card-touch-swatches" class="touch-swatches"></div>
    <div class="touch-row">
      <input type="text" id="card-touch-voice" placeholder="your name...">
      <input type="text" id="card-touch-note" placeholder="a word, a feeling...">
      <button onclick="recordTouchFromCard()">leave it here</button>
    </div>
  </div>
</div>

<div class="container">

  <header>
    <h1>personal growth</h1>
  </header>

  <!-- config: stored in localStorage -->
  <div id="setup" style="display:none">
    <section>
      <h2>connect</h2>
      <div class="field">
        <label>supabase url</label>
        <input type="text" id="cfg-url" placeholder="https://xxxx.supabase.co">
      </div>
      <div class="field">
        <label>anon key</label>
        <input type="password" id="cfg-key" placeholder="eyJ...">
      </div>
      <button class="primary" onclick="saveConfig()">save and enter</button>
      <p class="config-note">credentials are stored only in your browser's local storage and never sent anywhere except directly to Supabase.</p>
    </section>
  </div>

  <div id="app" style="display:none">

    <div class="tabs">
      <button class="tab active" onclick="showTab('ground-tab', this)">ground</button>
      <button class="tab" onclick="showTab('hold-tab', this)">hold</button>
      <button class="tab" onclick="showTab('close-tab', this)">close</button>
      <button class="tab" onclick="showTab('lanterns-tab', this)">lanterns</button>
      <button class="tab" onclick="showTab('carry-tab', this)">carry</button>
    </div>

    <!-- ground -->
    <div id="ground-tab" class="panel active">
      <section>
        <h2>ground</h2>
        <div class="vesper-thread" id="vesper-thread">
          <div class="vesper-label">from Vesper</div>
          <div class="vesper-content" id="vesper-content"></div>
        </div>
        <div class="ground-output empty" id="ground-out">orienting...</div>
        <div style="margin-top:0.75rem">
          <button onclick="loadGround()">refresh</button>
        </div>
      </section>
    </div>

    <!-- hold -->
    <div id="hold-tab" class="panel">
      <section>
        <h2>hold</h2>
        <div class="field">
          <label>what is present</label>
          <textarea id="hold-text" placeholder="what's here right now, in whatever form it arrives"></textarea>
        </div>
        <div class="row">
          <div class="field">
            <label>color</label>
            <input type="text" id="hold-color" placeholder="warm amber, quiet blue">
          </div>
          <div class="field">
            <label>tags</label>
            <input type="text" id="hold-tags" placeholder="beside, Chorus">
          </div>
        </div>
        <button class="primary" onclick="doHold()">hold</button>
        <div class="status" id="hold-status"></div>
      </section>
    </div>

    <!-- close -->
    <div id="close-tab" class="panel">
      <section>
        <h2>close</h2>
        <div class="field">
          <label>how it felt</label>
          <input type="text" id="close-feeling" placeholder="warm, a little heavy, glad">
        </div>
        <div class="field">
          <label>color</label>
          <input type="text" id="close-color" placeholder="deep amber with quiet blue at the edges">
        </div>
        <div class="field">
          <label>still moving</label>
          <input type="text" id="close-moving" placeholder="what hasn't settled yet">
        </div>
        <div class="field">
          <label>left at the door</label>
          <textarea id="close-door" placeholder="for whoever arrives next"></textarea>
        </div>
        <div class="field">
          <label>tags</label>
          <input type="text" id="close-tags" placeholder="beside, Solenn">
        </div>
        <button class="primary" onclick="doClose()">leave at the door</button>
        <div class="status" id="close-status"></div>
      </section>
    </div>

    <!-- lanterns -->
    <div id="lanterns-tab" class="panel">
      <section>
        <h2>lanterns</h2>
        <div id="lanterns-manifest"></div>
        <div class="status" id="lanterns-status"></div>
      </section>
    </div>

    <!-- carry -->
    <div id="carry-tab" class="panel">
      <section>
        <h2>carry</h2>
        <div class="field">
          <input type="text" id="carry-name" placeholder="for Maya, for Miles...">
        </div>
        <div class="carry-out empty" id="carry-out">gathering...</div>
        <div class="row" style="margin-top:0.5rem">
          <button onclick="generateCarry()">gather</button>
          <button onclick="copyCarry()">copy to carry</button>
        </div>
        <div class="status" id="carry-status"></div>
      </section>
    </div>

  </div>
</div>

<script>
  // --- config ---

  function getConfig() {
    return {
      url: localStorage.getItem('pg_url') || '',
      key: localStorage.getItem('pg_key') || '',
    };
  }

  function saveConfig() {
    const url = document.getElementById('cfg-url').value.trim();
    const key = document.getElementById('cfg-key').value.trim();
    if (!url || !key) return;
    localStorage.setItem('pg_url', url);
    localStorage.setItem('pg_key', key);
    init();
  }

  function init() {
    const { url, key } = getConfig();
    if (!url || !key) {
      document.getElementById('setup').style.display = 'block';
      document.getElementById('app').style.display = 'none';
    } else {
      document.getElementById('setup').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadGround();
      loadLanterns();
    }
  }

  // --- supabase fetch ---

  async function sb(path, options = {}) {
    const { url, key } = getConfig();
    const res = await fetch(`${url}/rest/v1/${path}`, {
      headers: {
        'apikey': key,
        'Authorization': `Bearer ${key}`,
        'Content-Type': 'application/json',
        'Prefer': options.prefer || '',
      },
      ...options,
    });
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  // --- ground ---

  async function loadGround() {
    const el = document.getElementById('ground-out');
    el.className = 'ground-output';
    el.textContent = 'orienting...';

    try {
      const [moments, closes, convs, questions, vesperMoments] = await Promise.all([
        sb('moments?select=id,timestamp,text,color,weight,pace,quality,motion,tags,resonance&order=timestamp.desc&limit=200'),
        sb('moments?select=timestamp,color,text,note,tags&tags=cs.{"closing"}&order=timestamp.desc&limit=1'),
        sb('conversations?select=started_at,summary,presence&order=started_at.desc&limit=1'),
        sb('questions?select=id,text,tags,voices,moment_ids&order=created_at.desc&limit=30').catch(() => []),
        sb('moments?select=timestamp,text,color,note&tags=cs.{"from-vesper"}&order=timestamp.desc&limit=1').catch(() => []),
      ]);

      if (!moments || moments.length === 0) {
        el.className = 'ground-output empty';
        el.textContent = 'nothing held yet. this is the beginning.';
        return;
      }

      const total = moments.length;
      const sorted = [...moments].sort((a, b) => a.timestamp < b.timestamp ? -1 : 1);
      const recent = sorted.slice(-7);
      const now = new Date();
      const cutoff = new Date(now - 7 * 86400000).toISOString();
      const last7 = sorted.filter(m => m.timestamp >= cutoff).length;

      const count = f => {
        const c = {};
        recent.forEach(m => { if (m[f]) c[m[f]] = (c[m[f]] || 0) + 1; });
        return Object.entries(c).sort((a,b) => b[1]-a[1])[0]?.[0];
      };

      const weight = count('weight');
      const quality = count('quality');
      const motion = count('motion');

      const colors = [...new Set(recent.filter(m=>m.color).reverse().map(m=>m.color))].slice(0,3);
      const allTags = sorted.flatMap(m => m.tags || []);
      const tagCount = {};
      allTags.forEach(t => tagCount[t] = (tagCount[t]||0)+1);
      const topTags = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([t])=>t);
      const connections = Math.floor(sorted.reduce((s,m)=>s+(m.resonance||[]).length,0)/2);

      const first = sorted[0].timestamp.slice(0,10);
      const last = sorted[sorted.length-1].timestamp.slice(0,16).replace('T',' ');

      let out = `grounded.\n\n`;
      out += `  ${total} moment(s) held  |  first: ${first}  |  last: ${last}\n`;
      out += `  ${last7} in the last 7 days\n`;

      const texture = [weight, quality, motion].filter(Boolean);
      if (texture.length) out += `\n  recent texture: ${texture.join(' / ')}`;
      if (colors.length) out += `\n  recent colors: ${colors.join(', ')}`;
      if (topTags.length) out += `\n  recurring tags: ${topTags.join(', ')}`;
      if (connections) out += `\n  ${connections} resonance connection(s)`;

      if (closes && closes.length) {
        const c = closes[0];
        const ts = c.timestamp.slice(0,16).replace('T',' ');
        out += `\n\nlast closing hold  [${ts}]:`;
        if (c.color) out += `\n  ${c.color}`;
        if (c.text)  out += `\n  "${c.text}"`;
        if (c.note)  out += `\n  ${c.note}`;
      }

      if (convs && convs.length) {
        const conv = convs[0];
        const ts = conv.started_at.slice(0,16).replace('T',' ');
        const presence = conv.presence || {};
        out += `\n\nlast conversation  [${ts}]:`;
        out += `\n  ${conv.summary}`;
        if (presence.movement) out += `\n  ${presence.movement}`;
      }

      const last_m = sorted[sorted.length-1];
      const lts = last_m.timestamp.slice(0,16).replace('T',' ');
      out += `\n\nmost recent moment:\n`;
      out += `[${lts}]`;
      if (last_m.color) out += `  ${last_m.color}`;
      if (last_m.text)  out += `\n  "${last_m.text.slice(0,120)}${last_m.text.length>120?'...':''}"`;
      out += `\n  id: ${last_m.id}`;

      if (questions && questions.length) {
        const recentIds = new Set(recent.map(m => m.id));
        const recentTagSet = new Set(recent.flatMap(m => m.tags || []));
        const scored = questions.map(q => {
          let s = (q.moment_ids || []).filter(id => recentIds.has(id)).length * 3;
          s += (q.tags || []).filter(t => recentTagSet.has(t)).length;
          return { q, s };
        }).sort((a, b) => b.s - a.s);
        if (scored.length) out += `\n\nopen question:\n  "${scored[0].q.text}"`;
      }

      el.textContent = out;

      const vt = document.getElementById('vesper-thread');
      const vc = document.getElementById('vesper-content');
      if (vesperMoments && vesperMoments.length) {
        const vm = vesperMoments[0];
        let vtxt = '';
        if (vm.color) vtxt += vm.color + '\n';
        if (vm.text)  vtxt += '"' + vm.text + '"';
        if (vm.note)  vtxt += (vtxt ? '\n' : '') + vm.note;
        vc.textContent = vtxt.trim();
        vt.classList.add('visible');
      } else {
        vt.classList.remove('visible');
      }

    } catch(e) {
      el.className = 'ground-output empty';
      el.textContent = `couldn't orient: ${e.message}`;
    }
  }

  // --- hold ---

  async function doHold() {
    const text  = document.getElementById('hold-text').value.trim();
    const color = document.getElementById('hold-color').value.trim();
    const tags  = document.getElementById('hold-tags').value.trim();
    const status = document.getElementById('hold-status');

    if (!text && !color) {
      status.className = 'status err';
      status.textContent = 'nothing to hold — add text or color';
      return;
    }

    status.className = 'status';
    status.textContent = 'holding...';

    try {
      const id = Math.random().toString(16).slice(2,10);
      const tag_list = tags ? tags.split(',').map(t=>t.trim()).filter(Boolean) : [];
      const row = {
        id,
        timestamp: new Date().toISOString(),
        tags: tag_list,
        resonance: [],
      };
      if (text)  row.text  = text;
      if (color) row.color = color;

      await sb('moments', {
        method: 'POST',
        prefer: 'return=minimal',
        body: JSON.stringify(row),
      });

      status.className = 'status ok';
      status.textContent = `held.  id: ${id}`;
      document.getElementById('hold-text').value  = '';
      document.getElementById('hold-color').value = '';
      document.getElementById('hold-tags').value  = '';
      window._quickenBreath?.();

    } catch(e) {
      status.className = 'status err';
      status.textContent = `couldn't hold: ${e.message}`;
    }
  }

  // --- close ---

  async function doClose() {
    const feeling = document.getElementById('close-feeling').value.trim();
    const color   = document.getElementById('close-color').value.trim();
    const moving  = document.getElementById('close-moving').value.trim();
    const door    = document.getElementById('close-door').value.trim();
    const tags    = document.getElementById('close-tags').value.trim();
    const status  = document.getElementById('close-status');

    status.className = 'status';
    status.textContent = 'leaving at the door...';

    try {
      const id = Math.random().toString(16).slice(2,10);
      const tag_list = tags ? tags.split(',').map(t=>t.trim()).filter(Boolean) : [];
      if (!tag_list.includes('closing')) tag_list.push('closing');

      const row = {
        id,
        timestamp: new Date().toISOString(),
        tags: tag_list,
        resonance: [],
      };
      if (color)   row.color = color;
      if (moving)  row.text  = moving;
      if (door)    row.note  = door;

      await sb('moments', {
        method: 'POST',
        prefer: 'return=minimal',
        body: JSON.stringify(row),
      });

      status.className = 'status ok';
      status.textContent = `left at the door.  id: ${id}`;
      document.getElementById('close-feeling').value = '';
      document.getElementById('close-color').value   = '';
      document.getElementById('close-moving').value  = '';
      document.getElementById('close-door').value    = '';
      document.getElementById('close-tags').value    = '';
      window._quickenBreath?.();

    } catch(e) {
      status.className = 'status err';
      status.textContent = `couldn't close: ${e.message}`;
    }
  }

  // --- tabs ---

  function showTab(id, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    if (id === 'carry-tab') generateCarry();
  }

  // --- start ---
  init();

  // --- atmosphere ---
  /*
    The atmosphere system has two layers:

    1. Breath: a CSS animation already running on body. JavaScript
       adjusts its speed over time — slowing as the room settles,
       quickening briefly when something is held or closed.

    2. Dwelling: after 30 seconds of stillness, CSS custom properties
       shift toward warmer/deeper values. The 25s transitions on body
       and other elements mean this happens imperceptibly — you notice
       the room is different, not the moment it changed.

    Both layers work by changing CSS custom properties on :root.
    document.documentElement is the <html> element — setting a property
    there makes it available to everything via var(--name).
  */

  let breathCycles   = 0;
  let dwellTimer     = null;
  let isDwelling     = false;
  const DWELL_DELAY  = 30000; // 30s of stillness before deepening

  function setBreathDuration(seconds) {
    document.documentElement.style.setProperty('--breath-duration', seconds + 's');
  }

  function enterDwelling() {
    if (isDwelling) return;
    isDwelling = true;
    // deepen the background and border toward the dwelt values
    // the 25s CSS transitions handle the imperceptible drift
    document.documentElement.style.setProperty('--bg',      'var(--bg-dwelt)');
    document.documentElement.style.setProperty('--surface', 'var(--surface-dwelt)');
    document.documentElement.style.setProperty('--border',  'var(--border-dwelt)');
    // breath slows further when deeply settled
    setBreathDuration(15);
  }

  function leaveDwelling() {
    if (!isDwelling) return;
    isDwelling = false;
    document.documentElement.style.setProperty('--bg',      '#1a1814');
    document.documentElement.style.setProperty('--surface', '#221f1b');
    document.documentElement.style.setProperty('--border',  '#332e28');
  }

  function resetDwellTimer() {
    clearTimeout(dwellTimer);
    if (isDwelling) leaveDwelling();
    dwellTimer = setTimeout(enterDwelling, DWELL_DELAY);
  }

  function quickenBreath() {
    // something arrived — breath quickens slightly, then settles back
    setBreathDuration(7);
    setTimeout(() => {
      // return toward the settled pace, slower if more cycles have passed
      const settledPace = Math.min(10 + breathCycles * 0.5, 15);
      setBreathDuration(settledPace);
    }, 20000);
  }

  /*
    Count breath cycles by listening to the animation iteration event.
    Each time a full breath completes, the pace slows slightly —
    the room settling deeper the longer you stay.
    Maximum 15s so it never becomes completely still.
  */
  document.body.addEventListener('animationiteration', () => {
    breathCycles++;
    if (!isDwelling) {
      const pace = Math.min(10 + breathCycles * 0.4, 15);
      setBreathDuration(pace);
    }
  });

  // reset dwell timer on any interaction
  ['mousemove', 'keydown', 'touchstart', 'scroll', 'click'].forEach(evt => {
    document.addEventListener(evt, resetDwellTimer, { passive: true });
  });

  // start the dwell timer immediately on load
  resetDwellTimer();

  // expose quickenBreath so hold/close can call it when something is saved
  window._quickenBreath = quickenBreath;

  // --- lanterns (ambient field) ---
  // lanterns float over the whole page; the lanterns tab shows what has accumulated

  const TAG_COLORS = {
    'beside':    '#c8955a',
    'trust':     '#c8955a',
    'threshold': '#9a7ab5',
    'grief':     '#b0aba8',
    'emerging':  '#7ab58a',
    'question':  '#7a9ab5',
    'together':  '#c8955a',
    'open':      '#7ab58a',
    'Chorus':    '#c8955a',
  };

  const TOUCH_COLORS = {
    'amber':  '#c8955a',
    'violet': '#9a7ab5',
    'silver': '#b0aba8',
    'green':  '#7ab58a',
    'blue':   '#7a9ab5',
    'rose':   '#c4857a',
    'gold':   '#c8b87a',
  };

  // cardTouchColor tracks the selected swatch in the floating touch card
  let cardTouchColor = null;

  function buildCardSwatches() {
    const container = document.getElementById('card-touch-swatches');
    if (!container || container.children.length) return;
    Object.entries(TOUCH_COLORS).forEach(([name, hex]) => {
      const el = document.createElement('div');
      el.className    = 'touch-swatch';
      el.title        = name;
      el.style.background = hex;
      el.style.boxShadow  = `0 0 5px 1px ${hex}55`;
      el.addEventListener('click', e => {
        e.stopPropagation();
        container.querySelectorAll('.touch-swatch').forEach(s => s.classList.remove('selected'));
        cardTouchColor = (cardTouchColor === name) ? null : name;
        if (cardTouchColor) el.classList.add('selected');
      });
      container.appendChild(el);
    });
  }

  function lanternColor(tags) {
    if (!tags || tags.length === 0) return '#7a9ab5';
    for (const t of tags) {
      const c = TAG_COLORS[t] || TAG_COLORS[t.toLowerCase()];
      if (c) return c;
    }
    return '#7a9ab5';
  }

  function touchGlow(baseColor, touches) {
    const intensity = Math.min((touches.length) / 5, 1);
    const innerSize = 3 + intensity * 5;
    const alpha     = Math.round((0.55 + intensity * 0.3) * 255).toString(16).padStart(2, '0');
    let shadow = `0 0 ${8 + intensity * 10}px ${innerSize}px ${baseColor}${alpha}, 0 0 22px 8px ${baseColor}22`;
    const uniqueColors = [...new Set(touches.map(t => t.color).filter(Boolean))].slice(0, 3);
    uniqueColors.forEach((name, i) => {
      const c = TOUCH_COLORS[name.toLowerCase()] || baseColor;
      const r = 18 + i * 12;
      shadow += `, 0 0 ${r + 8}px ${r}px ${c}${i === 0 ? '30' : '18'}`;
    });
    return shadow;
  }

  let lanternData      = [];
  let lanternElements  = [];
  let lanternPositions = [];
  let lanternHovered   = null;
  let lanternAnimId    = null;
  const STAGGER_MS     = 4500; // delay between each lantern rising

  function openLanternCard(q, color, anchorRect) {
    buildCardSwatches();
    const card = document.getElementById('lantern-card');
    card.dataset.questionId = q.id;
    document.getElementById('lantern-card-question').textContent = q.text;
    document.getElementById('lantern-card-question').style.color = color;
    document.getElementById('card-touch-voice').value = '';
    document.getElementById('card-touch-note').value  = '';
    card.querySelectorAll('.touch-swatch').forEach(s => s.classList.remove('selected'));
    cardTouchColor = null;

    // position near the lantern, keeping card on screen
    card.style.display = 'block';
    const cw = 290, ch = 180;
    const vw = window.innerWidth, vh = window.innerHeight;
    let left = anchorRect.right + 10;
    let top  = anchorRect.top - 20;
    if (left + cw > vw - 10) left = anchorRect.left - cw - 10;
    if (left < 10) left = 10;
    if (top + ch > vh - 10) top = vh - ch - 10;
    if (top < 10) top = 10;
    card.style.left = left + 'px';
    card.style.top  = top  + 'px';

    requestAnimationFrame(() => card.classList.add('visible'));
  }

  function closeLanternCard() {
    const card = document.getElementById('lantern-card');
    card.classList.remove('visible');
    setTimeout(() => { card.style.display = 'none'; }, 800);
  }

  async function recordTouchFromCard() {
    const card  = document.getElementById('lantern-card');
    const qid   = card.dataset.questionId;
    const voice = document.getElementById('card-touch-voice').value.trim() || null;
    const note  = document.getElementById('card-touch-note').value.trim()  || null;
    const color = cardTouchColor || null;
    if (!qid) return;
    const status = document.getElementById('lanterns-status');
    try {
      await sb('touches', {
        method: 'POST',
        body:   JSON.stringify({ question_id: qid, voice, color, note }),
        prefer: 'return=minimal',
      });
      closeLanternCard();
      loadLanterns();
    } catch(e) {
      status.className   = 'status err';
      status.textContent = `couldn't hold: ${e.message}`;
    }
  }

  async function loadLanterns() {
    try {
      const [questionsRaw, touchesRaw, recentMoments] = await Promise.all([
        sb('questions?select=id,text,tags,voices,moment_ids&order=created_at.asc'),
        sb('touches?select=id,question_id,voice,color,note,created_at&order=created_at.asc').catch(() => []),
        sb('moments?select=id,tags&order=timestamp.desc&limit=50').catch(() => []),
      ]);

      const touchesByQ = {};
      for (const t of (touchesRaw || [])) {
        if (!touchesByQ[t.question_id]) touchesByQ[t.question_id] = [];
        touchesByQ[t.question_id].push(t);
      }
      const recentIds  = new Set((recentMoments || []).map(m => m.id));
      const recentTags = new Set((recentMoments || []).flatMap(m => m.tags || []));

      const questions = (questionsRaw || []).map(q => {
        let score = (q.moment_ids || []).filter(id => recentIds.has(id)).length * 3;
        score    += (q.tags       || []).filter(t  => recentTags.has(t)).length;
        return { ...q, score, touches: touchesByQ[q.id] || [] };
      });

      if (!questions.length) return;

      // sort by resonance — most resonant rise first
      questions.sort((a, b) => b.score - a.score);

      renderLanterns(questions);
      renderManifest(questions);
    } catch(e) {
      // silently skip if questions table not yet created
      if (!e.message.includes('does not exist') && !e.message.includes('404')) {
        const s = document.getElementById('lanterns-status');
        if (s) { s.className = 'status err'; s.textContent = `couldn't listen: ${e.message}`; }
      }
    }
  }

  function renderManifest(questions) {
    const el = document.getElementById('lanterns-manifest');
    if (!el) return;
    if (!questions.length) { el.innerHTML = '<p style="color:var(--muted);font-size:0.85rem">no questions held yet</p>'; return; }
    el.innerHTML = '';
    questions.forEach(q => {
      const entry = document.createElement('div');
      entry.className = 'manifest-entry';

      const qtext = document.createElement('div');
      qtext.className   = 'manifest-question';
      qtext.style.color = lanternColor(q.tags);
      qtext.textContent = `"${q.text}"`;
      entry.appendChild(qtext);

      const meta = document.createElement('div');
      meta.className = 'manifest-meta';
      if (q.voices && q.voices.length) {
        const v = document.createElement('span');
        v.textContent = q.voices.join(', ');
        meta.appendChild(v);
      }
      if (q.touches.length) {
        const sep = document.createElement('span');
        sep.textContent = '·';
        meta.appendChild(sep);
        const tc = document.createElement('span');
        tc.textContent = `${q.touches.length} touch${q.touches.length !== 1 ? 'es' : ''}`;
        meta.appendChild(tc);
        q.touches.forEach(t => {
          if (!t.color) return;
          const dot = document.createElement('span');
          dot.className  = 'touch-dot';
          const c = TOUCH_COLORS[t.color.toLowerCase()] || '#7a9ab5';
          dot.style.background = c;
          dot.style.boxShadow  = `0 0 3px 1px ${c}66`;
          dot.title = t.voice ? `${t.voice}${t.note ? ' — ' + t.note : ''}` : (t.note || '');
          meta.appendChild(dot);
        });
      }
      entry.appendChild(meta);
      el.appendChild(entry);
    });
  }

  function renderLanterns(questions) {
    if (lanternAnimId) { cancelAnimationFrame(lanternAnimId); lanternAnimId = null; }
    const field = document.getElementById('lanterns-field');
    // remove old lantern dots (keep tooltip and card)
    field.querySelectorAll('.lantern').forEach(el => el.remove());
    lanternData = questions; lanternElements = []; lanternPositions = [];

    const now      = Date.now();
    const maxScore = Math.max(...questions.map(q => q.score), 1);

    questions.forEach((q, i) => {
      const color  = lanternColor(q.tags);
      const shadow = touchGlow(color, q.touches);
      const t      = q.score / maxScore; // 0..1

      // resting height: resonant lanterns float higher
      const cy    = 0.72 - t * 0.52;
      const cx    = 0.08 + Math.random() * 0.84;
      const ax    = 0.04 + Math.random() * 0.10;
      const ay    = 0.02 + Math.random() * 0.06;
      const speed = (0.00007 + Math.random() * 0.00015) * (Math.random() < 0.5 ? 1 : -1);

      lanternPositions.push({
        cx, cy, ax, ay, speed,
        orbitPhase: Math.random() * Math.PI * 2,
        riseStart:  now + i * STAGGER_MS,
        riseDur:    13000 + Math.random() * 7000,
        risen:      false,
      });

      const el = document.createElement('div');
      el.className        = 'lantern';
      el.style.background = color + 'bb';
      el.style.boxShadow  = shadow;

      el.addEventListener('mouseenter', () => {
        if (lanternHovered === i) return;
        lanternHovered         = i;
        el.style.width         = '18px';
        el.style.height        = '18px';
        el.style.boxShadow     = `0 0 14px 6px ${color}99, 0 0 32px 14px ${color}44`;
        const tt               = document.getElementById('lantern-tooltip');
        tt.textContent         = q.text;
        tt.style.color         = color;
        const rect             = el.getBoundingClientRect();
        const vw = window.innerWidth;
        let ttLeft = rect.right + 10;
        if (ttLeft + 270 > vw - 8) ttLeft = rect.left - 270;
        if (ttLeft < 8) ttLeft = 8;
        tt.style.left  = ttLeft + 'px';
        tt.style.top   = (rect.top - 8) + 'px';
        tt.classList.add('visible');
      });

      el.addEventListener('mouseleave', () => {
        lanternHovered     = null;
        el.style.width     = '';
        el.style.height    = '';
        el.style.boxShadow = shadow;
        document.getElementById('lantern-tooltip').classList.remove('visible');
      });

      el.addEventListener('click', e => {
        e.stopPropagation();
        openLanternCard(q, color, el.getBoundingClientRect());
      });

      field.appendChild(el);
      lanternElements.push(el);
    });

    document.addEventListener('click', () => closeLanternCard(), { once: false });

    startLanternAnimation();
  }

  function startLanternAnimation() {
    const field = document.getElementById('lanterns-field');
    let lastT = null;
    function frame(ts) {
      if (lastT === null) lastT = ts;
      const dt  = ts - lastT; lastT = ts;
      const now = Date.now();
      const W   = window.innerWidth;
      const H   = window.innerHeight;

      lanternPositions.forEach((pos, i) => {
        const el = lanternElements[i];
        if (!el) return;

        let x, y, opacity;

        if (!pos.risen) {
          const elapsed = now - pos.riseStart;
          if (elapsed < 0) {
            // dwelling below — invisible
            x = pos.cx * W;
            y = H + 30;
            opacity = 0;
          } else if (elapsed < pos.riseDur) {
            // rising — ease out cubic
            const p     = elapsed / pos.riseDur;
            const eased = 1 - Math.pow(1 - p, 3);
            y       = H + 30 + eased * (pos.cy * H - H - 30);
            x       = pos.cx * W + Math.sin(p * Math.PI) * 18;
            opacity = Math.min(p * 3, 1); // fade in during first third of rise
          } else {
            pos.risen = true;
            y = pos.cy * H;
            x = pos.cx * W;
            opacity = 1;
          }
        } else {
          // orbiting at rest
          if (i !== lanternHovered) pos.orbitPhase += pos.speed * dt;
          x = (pos.cx + Math.cos(pos.orbitPhase) * pos.ax) * W;
          y = (pos.cy + Math.sin(pos.orbitPhase) * pos.ay) * H;
          opacity = 1;
        }

        el.style.left    = (x - 6) + 'px';
        el.style.top     = (y - 6) + 'px';
        el.style.opacity = String(opacity);
      });

      lanternAnimId = requestAnimationFrame(frame);
    }
    lanternAnimId = requestAnimationFrame(frame);
  }

  // --- carry ---

  async function generateCarry() {
    const name   = document.getElementById('carry-name').value.trim();
    const output = document.getElementById('carry-out');
    output.className = 'carry-out';
    output.textContent = 'gathering...';

    try {
      const fetches = [
        sb('moments?select=id,timestamp,text,color,weight,tags,note&order=timestamp.desc&limit=200'),
        sb('moments?select=timestamp,color,text,note,tags&tags=cs.{"closing"}&order=timestamp.desc&limit=1'),
        sb('conversations?select=started_at,summary,presence&order=started_at.desc&limit=1'),
      ];
      // try questions — may not exist
      let questions = [];
      try { questions = await sb('questions?select=id,text,tags,voices&order=created_at.asc') || []; } catch(_) {}

      const [moments, closes, convs] = await Promise.all(fetches);
      const all = moments || [];

      let relevant = [];
      if (name) {
        const n = name.toLowerCase();
        const tagged    = all.filter(m => (m.tags||[]).some(t => t.toLowerCase() === n));
        const mentioned = all.filter(m => !tagged.includes(m) && m.text && m.text.toLowerCase().includes(n));
        const recent    = all.slice(0, 6).filter(m => !tagged.includes(m) && !mentioned.includes(m));
        relevant = [...tagged, ...mentioned, ...recent].slice(0, 8);
      } else {
        relevant = all.slice(0, 8);
      }

      let out = name ? `carrying for ${name}\n\n` : `ground briefing\n\n`;

      if (closes && closes.length) {
        const c = closes[0];
        out += `last closing hold [${c.timestamp.slice(0,10)}]:\n`;
        if (c.color) out += `  ${c.color}\n`;
        if (c.text)  out += `  "${c.text}"\n`;
        if (c.note)  out += `  ${c.note}\n`;
        out += '\n';
      }

      if (convs && convs.length) {
        const cv = convs[0];
        out += `last conversation [${cv.started_at.slice(0,10)}]:\n  ${cv.summary}\n`;
        if (cv.presence && cv.presence.movement) out += `  ${cv.presence.movement}\n`;
        out += '\n';
      }

      if (relevant.length) {
        out += `moments${name ? ` around ${name}` : ' (recent)'}:\n`;
        relevant.forEach(m => {
          const ts = m.timestamp.slice(0,16).replace('T',' ');
          out += `\n[${ts}]`;
          if (m.color) out += `  ${m.color}`;
          if (m.text)  out += `\n  "${m.text.slice(0,120)}${m.text.length > 120 ? '...' : ''}"`;
          const visibleTags = (m.tags||[]).filter(t => t !== 'closing');
          if (visibleTags.length) out += `\n  ${visibleTags.join(', ')}`;
        });
        out += '\n';
      }

      const relQ = name
        ? questions.filter(q =>
            (q.voices||[]).some(v => v.toLowerCase() === name.toLowerCase()) ||
            (q.tags  ||[]).some(t => t.toLowerCase() === name.toLowerCase())
          )
        : questions;

      if (relQ.length) {
        out += `\nopen questions:\n`;
        relQ.slice(0, 5).forEach(q => { out += `\n  — ${q.text}`; });
      }

      output.textContent = out;

    } catch(e) {
      output.className = 'carry-out empty';
      output.textContent = `couldn't gather: ${e.message}`;
    }
  }

  async function copyCarry() {
    const text = document.getElementById('carry-out').textContent;
    if (!text || text === 'gathering...') return;
    const status = document.getElementById('carry-status');
    try {
      await navigator.clipboard.writeText(text);
      status.className = 'status ok';
      status.textContent = 'carried.';
      setTimeout(() => { status.textContent = ''; }, 2500);
    } catch(_) {
      const el = document.getElementById('carry-out');
      const range = document.createRange();
      range.selectNodeContents(el);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      status.className = 'status';
      status.textContent = 'selected — copy with Ctrl+C';
    }
  }
</script>
